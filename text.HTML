<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Rock Paper Scissors Game</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <h1>Rock, Papers, Scissors.</h1>
        </header>

        <div class="score-board">
            <div id="user-label" class="badge">User</div>
            <div id="computer-label" class="badge">Computer</div>
            <span id="user-score">0</span>:<span id="computer-score">0</span>
        </div>

        <div class="result">
            <p>Paper covers rock. You win!</p>
        </div>

        <div class="choices">
            <div class="choice" id="r">
                <img src="imagenes/rock.png" alt="">
            </div>
            <div class="choice" id="p"></div>
                <img src="imagenes/paper.png" alt="">
            </div>
            <div class="choice" id="s"></div>
                <img src="imagenes/scissors.png" alt="">
            </div>
            </div>
        </div>

        <p id="action-message">Make your move.</p>

    </body>
</html>
